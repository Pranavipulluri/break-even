<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Law Firm Website Builder - Professional Legal Website Creation</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Crimson+Text:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1a365d',
                        secondary: '#2d3748',
                        accent: '#b91c1c',
                        gold: '#d4af37'
                    },
                    fontFamily: {
                        'sans': ['Inter', 'system-ui', 'sans-serif'],
                        'serif': ['Crimson Text', 'Georgia', 'serif']
                    }
                }
            }
        }
    </script>
    <style>
        .form-step { display: none; }
        .form-step.active { display: block; }
        .progress-bar { transition: width 0.3s ease; }
        .attorney-card { transition: all 0.3s ease; }
        .attorney-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <!-- Header -->
    <header class="bg-gradient-to-r from-primary to-secondary text-white py-6">
        <div class="container mx-auto px-4">
            <div class="text-center">
                <div class="flex items-center justify-center mb-4">
                    <div class="h-12 w-12 bg-gold rounded-lg flex items-center justify-center mr-3">
                        <i class="fas fa-balance-scale text-white text-xl"></i>
                    </div>
                    <h1 class="text-3xl font-bold font-serif">Professional Law Firm Website Builder</h1>
                </div>
                <p class="text-lg opacity-90">Create a premium legal website with consultation booking and client management</p>
            </div>
        </div>
    </header>

    <!-- Progress Bar -->
    <div class="bg-white shadow-sm">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center mb-2">
                <span class="text-sm font-medium text-gray-600">Step <span id="currentStep">1</span> of 6</span>
                <span class="text-sm text-gray-500" id="stepTitle">Firm Information</span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2">
                <div class="progress-bar bg-gradient-to-r from-primary to-accent h-2 rounded-full" style="width: 16.67%"></div>
            </div>
        </div>
    </div>

    <!-- Main Form -->
    <div class="container mx-auto px-4 py-8">
        <form id="lawFirmForm" class="max-w-4xl mx-auto">
            <!-- Step 1: Firm Information -->
            <div class="form-step active bg-white rounded-2xl shadow-lg p-8">
                <h2 class="text-2xl font-bold text-gray-900 mb-6 font-serif">
                    <i class="fas fa-building text-primary mr-3"></i>
                    Law Firm Information
                </h2>
                
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Law Firm Name *</label>
                        <input type="text" id="firmName" required 
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition"
                               placeholder="Smith & Associates Law Firm">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Tagline/Motto</label>
                        <input type="text" id="firmTagline"
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition"
                               placeholder="Excellence in Legal Advocacy">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Years of Experience *</label>
                        <input type="number" id="yearsExperience" required min="1" max="100"
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition"
                               placeholder="25">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Clients Served *</label>
                        <input type="number" id="clientsServed" required min="1"
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition"
                               placeholder="1500">
                    </div>
                    
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Firm Description *</label>
                        <textarea id="firmDescription" required rows="4"
                                  class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition resize-none"
                                  placeholder="Describe your law firm's mission, values, and commitment to clients..."></textarea>
                    </div>
                </div>
            </div>

            <!-- Additional steps would go here... -->
            <!-- For now, I'll create a simplified version to test functionality -->

            <!-- Navigation Buttons -->
            <div class="flex justify-between mt-8">
                <button type="button" id="prevBtn" class="bg-gray-300 text-gray-700 px-6 py-3 rounded-lg hover:bg-gray-400 transition font-semibold hidden">
                    <i class="fas fa-arrow-left mr-2"></i>Previous
                </button>
                <button type="submit" id="submitBtn" class="bg-gradient-to-r from-accent to-red-600 text-white px-8 py-3 rounded-lg hover:shadow-lg transition font-bold ml-auto">
                    <i class="fas fa-rocket mr-2"></i>Create Law Firm Website
                </button>
            </div>
        </form>
    </div>

    <!-- Loading Modal -->
    <div id="loadingModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50">
        <div class="flex items-center justify-center min-h-screen">
            <div class="bg-white rounded-2xl p-8 text-center max-w-md w-full mx-4">
                <div class="animate-spin h-16 w-16 border-4 border-primary border-t-transparent rounded-full mx-auto mb-4"></div>
                <h3 class="text-xl font-bold text-gray-900 mb-2">Creating Your Law Firm Website</h3>
                <p class="text-gray-600">Please wait while we build your professional legal website...</p>
            </div>
        </div>
    </div>

    <script>
        // Simple form submission for testing
        document.getElementById('lawFirmForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Show loading modal
            document.getElementById('loadingModal').classList.remove('hidden');
            
            // Collect basic form data
            const formData = new FormData();
            formData.append('firmName', document.getElementById('firmName').value);
            formData.append('firmTagline', document.getElementById('firmTagline').value);
            formData.append('yearsExperience', document.getElementById('yearsExperience').value);
            formData.append('clientsServed', document.getElementById('clientsServed').value);
            formData.append('firmDescription', document.getElementById('firmDescription').value);
            
            // Default values for testing
            formData.append('officeAddress', '123 Main Street, Suite 100');
            formData.append('city', 'New York');
            formData.append('state', 'NY');
            formData.append('zipCode', '10001');
            formData.append('phoneNumber', '(555) 123-4567');
            formData.append('emailAddress', 'contact@' + document.getElementById('firmName').value.toLowerCase().replace(/[^a-z0-9]/g, '') + '.com');
            formData.append('practiceAreas', JSON.stringify(['criminal', 'family', 'corporate']));
            formData.append('colorTheme', 'blue');
            formData.append('generateBusinessCards', true);
            formData.append('enableBookingSync', true);
            formData.append('enableChatIntegration', true);
            
            // Add a default attorney
            formData.append('attorneyCount', 1);
            formData.append('attorney_0_name', 'Senior Attorney');
            formData.append('attorney_0_title', 'Managing Partner');
            formData.append('attorney_0_experience', '15');
            formData.append('attorney_0_bio', 'Experienced attorney dedicated to providing excellent legal representation.');
            
            // Submit to integration service
            fetch('http://localhost:5000/api/create-law-firm-website', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('loadingModal').classList.add('hidden');
                if (data.success) {
                    showSuccessModal(data);
                } else {
                    alert('Error creating website: ' + (data.error || 'Unknown error occurred'));
                }
            })
            .catch(error => {
                document.getElementById('loadingModal').classList.add('hidden');
                console.error('Error:', error);
                alert('Network error occurred. Please try again.');
            });
        });

        function showSuccessModal(data) {
            const modal = document.createElement('div');
            modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4';
            modal.innerHTML = `
                <div class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-96 overflow-y-auto">
                    <div class="p-8">
                        <div class="text-center mb-6">
                            <div class="h-16 w-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                <i class="fas fa-check text-green-600 text-2xl"></i>
                            </div>
                            <h3 class="text-2xl font-bold text-gray-900 mb-2">Law Firm Website Created Successfully!</h3>
                            <p class="text-gray-600">Your professional legal website is now live with all integrations active.</p>
                        </div>
                        
                        <div class="space-y-4 mb-6">
                            <div class="flex items-center justify-between p-4 bg-blue-50 rounded-lg">
                                <span class="font-medium text-blue-900">Website URL:</span>
                                <a href="${data.website_url}" target="_blank" class="text-blue-600 hover:text-blue-800 font-medium break-all">
                                    ${data.website_url}
                                </a>
                            </div>
                            
                            ${data.qr_code_url ? `
                            <div class="flex items-center justify-between p-4 bg-purple-50 rounded-lg">
                                <span class="font-medium text-purple-900">QR Code:</span>
                                <a href="${data.qr_code_url}" target="_blank" class="text-purple-600 hover:text-purple-800 font-medium">
                                    Download QR Code
                                </a>
                            </div>
                            ` : ''}
                            
                            <div class="p-4 bg-green-50 rounded-lg">
                                <span class="font-medium text-green-900 block mb-2">Active Features:</span>
                                <div class="grid grid-cols-2 gap-2 text-sm text-green-800">
                                    <div class="flex items-center">
                                        <i class="fas fa-check-circle mr-2"></i>
                                        Professional Website
                                    </div>
                                    <div class="flex items-center">
                                        <i class="fas fa-check-circle mr-2"></i>
                                        Business Cards
                                    </div>
                                    <div class="flex items-center">
                                        <i class="fas fa-check-circle mr-2"></i>
                                        Email Automation
                                    </div>
                                    <div class="flex items-center">
                                        <i class="fas fa-check-circle mr-2"></i>
                                        Booking System
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="flex space-x-4">
                            <button onclick="window.open('${data.website_url}', '_blank')" 
                                    class="flex-1 bg-primary text-white py-3 rounded-lg font-medium hover:bg-blue-700 transition">
                                <i class="fas fa-external-link-alt mr-2"></i>
                                View Website
                            </button>
                            <button onclick="location.reload()" 
                                    class="flex-1 bg-gray-600 text-white py-3 rounded-lg font-medium hover:bg-gray-700 transition">
                                <i class="fas fa-plus mr-2"></i>
                                Create Another
                            </button>
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }
    </script>
</body>
</html>
